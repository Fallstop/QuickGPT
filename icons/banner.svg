<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="-10%" r="70%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="280" fill="#0b0a10"/>
  <rect width="1200" height="280" fill="url(#glow)"/>

  <!-- Mark: chevrons in a rounded ink square -->
  <g transform="translate(380, 84)">
    <rect width="112" height="112" rx="24" fill="#15131c"/>
    <g transform="translate(0,0) scale(2)">
      <path d="M14 18 L22 28 L14 38" stroke="#c4b5fd" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
      <path d="M23 18 L31 28 L23 38" stroke="#d6ccff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
      <path d="M32 18 L40 28 L32 38" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Wordmark: "quick" at 75% opacity white + "GPT" in violet, JetBrains Mono -->
  <g font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace"
     font-size="72" font-weight="500" letter-spacing="-1.5">
    <text x="520" y="168" fill="#ffffff" fill-opacity="0.75">quick</text>
    <text x="724" y="168" fill="#8b5cf6" font-weight="700">GPT</text>
  </g>

  <!-- Tagline -->
  <text x="600" y="220" text-anchor="middle"
        font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="16" fill="#9592a3" letter-spacing="4">
    CHATGPT · ACCELERATED
  </text>
</svg>
