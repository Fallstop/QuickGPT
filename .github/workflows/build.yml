name: Build

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      zip-name: ${{ steps.zip.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Build extension zip
        id: zip
        run: |
          pnpm run package
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            target="quickgpt-${GITHUB_REF_NAME}.zip"
          else
            target="quickgpt-${GITHUB_SHA::7}.zip"
          fi
          mv quickgpt.zip "$target"
          echo "name=$target" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.name }}
          path: ${{ steps.zip.outputs.name }}
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.zip-name }}

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.build.outputs.zip-name }}
          generate_release_notes: true
          draft: false
          prerelease: false
